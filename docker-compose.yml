# OSOD — Medplum FHIR foundation (dev)
# Runs locally on laptop. Same file deploys to Iris unchanged.
#
# Start:   docker compose up -d
# Logs:    docker compose logs -f medplum-server
# Stop:    docker compose down
# Reset:   docker compose down -v    (nukes Postgres volume — fresh start)
#
# First-run: npm run setup-practice (interactive, human-supervised)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: medplum
      POSTGRES_USER: medplum
      POSTGRES_PASSWORD: medplum
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medplum -d medplum"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - osod-internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "medplum"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "medplum", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - osod-internal

  medplum-server:
    image: medplum/medplum-server:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./medplum.config.json:/config/medplum.config.json:ro
      - medplum-binary:/data/binary
      - ./backup:/backup
    ports:
      - "8103:8103"
    command: ["file:/config/medplum.config.json"]
    networks:
      - osod-internal

  medplum-app:
    image: medplum/medplum-app:latest
    restart: unless-stopped
    depends_on:
      - medplum-server
    ports:
      - "8100:3000"
    environment:
      MEDPLUM_BASE_URL: http://localhost:8103/
    networks:
      - osod-internal

  osod-core:
    image: node:22-alpine
    profiles: ["agentops"]
    working_dir: /workspace
    command: ["npm", "--prefix", "mcp", "run", "start"]
    environment:
      MEDPLUM_BASE_URL: http://medplum-server:8103/
      OSOD_POSTGRES_URL: postgresql://medplum:medplum@postgres:5432/medplum
      OSOD_AGENTOPS_RUNTIME: supervisor
      NODE_OPTIONS: --experimental-network-imports=false
    volumes:
      - ./:/workspace:ro
    depends_on:
      medplum-server:
        condition: service_started
    networks:
      - osod-internal
      - osod-egress

  osod-agent-iris:
    image: node:22-alpine
    profiles: ["agentops"]
    working_dir: /workspace
    command: ["node", "mcp/dist/agentops/runtime/agent-process.js"]
    environment:
      AGENT_DEVICE_ID: https://osod.dev/agents/iris
      MEDPLUM_BASE_URL: http://medplum-server:8103/
      OSOD_CORE_IPC_URL: http://osod-core:8787/
    volumes:
      - ./:/workspace:ro
    depends_on:
      - osod-core
    networks:
      - osod-internal

volumes:
  postgres-data:
  medplum-binary:

networks:
  osod-internal:
    internal: true
  osod-egress:
