# OSOD — Medplum FHIR foundation (dev)
# Runs locally on laptop. Same file deploys to Iris unchanged.
#
# Start:   docker compose up -d
# Logs:    docker compose logs -f medplum-server
# Stop:    docker compose down
# Reset:   docker compose down -v    (nukes Postgres volume — fresh start)
#
# First-run: create admin account at http://localhost:8100/register

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: medplum
      POSTGRES_USER: medplum
      POSTGRES_PASSWORD: medplum
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medplum -d medplum"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "medplum"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "medplum", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  medplum-server:
    image: medplum/medplum-server:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./medplum.config.json:/usr/src/medplum/packages/server/medplum.config.json:ro
    ports:
      - "8103:8103"
      - "8100:8100"
    command: ["node", "packages/server/dist/index.js", "file:medplum.config.json"]

volumes:
  postgres-data:
