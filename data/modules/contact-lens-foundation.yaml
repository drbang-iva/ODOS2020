module: contact-lens-foundation
version: 0.4.0
status: active
description: v0.4a data foundation for contact-lens devices, lab catalogs, materials, fit findings, and longitudinal query surfaces.
routes:
  - none-v0.4a-data-foundation-only
profiles:
  - https://osod.dev/fhir/StructureDefinition/Device-ContactLens
  - https://osod.dev/fhir/StructureDefinition/Device-OrthoKLens
  - https://osod.dev/fhir/StructureDefinition/Device-CornealGPLens
  - https://osod.dev/fhir/StructureDefinition/Device-ScleralLens
  - https://osod.dev/fhir/StructureDefinition/Device-HybridLens
  - https://osod.dev/fhir/StructureDefinition/Device-SoftLens
  - https://osod.dev/fhir/StructureDefinition/Observation-KReadings
  - https://osod.dev/fhir/StructureDefinition/Observation-Pachymetry
  - https://osod.dev/fhir/StructureDefinition/Observation-MeibomianGlandScore
  - https://osod.dev/fhir/StructureDefinition/Observation-TBUT
  - https://osod.dev/fhir/StructureDefinition/Observation-Schirmer
  - https://osod.dev/fhir/StructureDefinition/Observation-ContactLensFitFinding
code_systems:
  - https://osod.dev/fhir/CodeSystem/contact-lens-type
  - https://osod.dev/fhir/CodeSystem/contact-lens-parameter
  - https://osod.dev/fhir/CodeSystem/contact-lens-fitting-event
  - https://osod.dev/fhir/CodeSystem/contact-lens-clinical-observation
  - https://osod.dev/fhir/CodeSystem/contact-lens-material
