  - https://osod.dev/fhir/ValueSet/hybrid-lens-parameters
event_types:
  - contact-lens-device-created
  - contact-lens-device-properties-updated
  - contact-lens-fit-finding-recorded
  - contact-lens-trial-started
  - contact-lens-remake-recorded
tools:
  - create_lens_device
  - update_lens_device_properties
  - create_device_definition
  - create_concept_map
