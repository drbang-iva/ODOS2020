services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: osod
      POSTGRES_USER: osod
      POSTGRES_PASSWORD: osod_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osod"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    image: postgres:16
    environment:
      POSTGRES_DB: osod_test
      POSTGRES_USER: osod
      POSTGRES_PASSWORD: osod_dev
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osod"]
      interval: 5s
      timeout: 5s
      retries: 5

  orthanc:
    image: orthancteam/orthanc:24.12.1
    ports:
      - "8042:8042"
      - "4242:4242"
    volumes:
      - orthanc_data:/var/lib/orthanc/db
    environment:
      ORTHANC__REGISTERED_USERS: '{"osod": "osod_dev"}'
    profiles:
      - equipment

volumes:
  pgdata:
  orthanc_data:
